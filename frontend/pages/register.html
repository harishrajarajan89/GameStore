<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — GameVault</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <div id="navbar"></div>

  <div class="auth-page">
    <div class="auth-box">
      <h1>Create Account</h1>
      <p>Create your own account to browse, add games to cart, and place orders.</p>

      <div id="alert-box"></div>

      <form class="auth-form" id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required minlength="3" maxlength="50"/>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-group">
            <input type="password" id="password" placeholder="Min 8 characters" required minlength="8" oninput="updatePasswordIcon('password')"/>
            <button type="button" class="password-toggle" onclick="togglePassword('password')">
              <svg class="eye-icon" id="password-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-group">
            <input type="password" id="confirm-password" placeholder="Repeat your password" required oninput="updatePasswordIcon('confirm-password')"/>
            <button type="button" class="password-toggle" onclick="togglePassword('confirm-password')">
              <svg class="eye-icon" id="confirm-password-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in here</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      if (field.type === 'password') {
        field.type = 'text';
      } else {
        field.type = 'password';
      }
    }

    function updatePasswordIcon(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(fieldId + '-icon');
      if (field.value.length > 0) {
        icon.classList.add('visible');
      } else {
        icon.classList.remove('visible');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isLoggedIn()) { window.location.href = '/index.html'; return; }
      renderNavbar('register');

      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('alert-box');

        const username = document.getElementById('username').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm-password').value;
        const btn      = document.getElementById('register-btn');

        if (!username || !email || !password) {
          showAlert('alert-box', 'All fields are required.', 'error'); return;
        }
        if (password !== confirm) {
          showAlert('alert-box', 'Passwords do not match.', 'error'); return;
        }
        if (password.length < 8) {
          showAlert('alert-box', 'Password must be at least 8 characters.', 'error'); return;
        }

        setLoading(btn, true, 'Creating account...');
        try {
          await AuthAPI.register({ username, email, password });
          showAlert('alert-box', 'Account created! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = '/pages/login.html', 1500);
        } catch (err) {
          showAlert('alert-box', err.message || 'Registration failed.', 'error');
        } finally {
          setLoading(btn, false, 'Create Account');
        }
      });
    });
  </script>
</body>
</html>
