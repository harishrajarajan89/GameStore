<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — GameVault</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <div id="navbar"></div>

  <div class="auth-page">
    <div class="auth-box">
      <h1>Welcome Back</h1>
      <p>Sign in to your GameVault account, or create a new one if you're visiting for the first time.</p>

      <div id="alert-box"></div>

      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required autocomplete="username"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-group">
            <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password" oninput="updatePasswordIcon('password')"/>
            <button type="button" class="password-toggle" onclick="togglePassword('password')">
              <svg class="eye-icon" id="password-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          Login
        </button>
      </form>

      <div class="auth-footer">
        No test credentials needed. <a href="register.html">Create your own account</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(fieldId + '-icon');
      if (field.type === 'password') {
        field.type = 'text';
      } else {
        field.type = 'password';
      }
    }

    function updatePasswordIcon(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(fieldId + '-icon');
      if (field.value.length > 0) {
        icon.classList.add('visible');
      } else {
        icon.classList.remove('visible');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isLoggedIn()) { window.location.href = '/index.html'; return; }
      renderNavbar('login');

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('alert-box');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');

        if (!username || !password) {
          showAlert('alert-box', 'Please fill in all fields.', 'error');
          return;
        }

        setLoading(btn, true, 'Signing in...');
        try {
          const user = await AuthAPI.login({ username, password });
          Auth.setUser(user);
          Auth.setCredentials(username, password);
          showToast(`Welcome back, ${user.username}!`, 'success');
          setTimeout(() => {
            window.location.href = user.role === 'ADMIN' ? '/pages/admin.html' : '/index.html';
          }, 600);
        } catch (err) {
          showAlert('alert-box', err.message || 'Invalid credentials.', 'error');
        } finally {
          setLoading(btn, false, 'Login');
        }
      });
    });
  </script>
</body>
</html>
